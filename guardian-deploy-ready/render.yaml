services:
  # Backend API Service
  - type: web
    name: guardian-sentinel-api
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: guardian-db
          property: connectionString
      - key: FORGE_API_KEY
        sync: false  # Set manually in Render dashboard
      - key: GEMINI_API_KEY
        sync: false  # Set manually in Render dashboard
      - key: GROQ_API_KEY
        sync: false  # Optional - set manually if you have it
      - key: ANTHROPIC_API_KEY
        sync: false  # Optional - set manually if you have it
    healthCheckPath: /health

databases:
  # PostgreSQL Database
  - name: guardian-db
    plan: free
    databaseName: guardian_sentinel
    user: guardian_user
